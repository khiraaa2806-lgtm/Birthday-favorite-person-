<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Birthday 🤍</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(-45deg,#0f172a,#1e293b,#312e81,#7c3aed);
background-size:400% 400%;
animation:bg 15s ease infinite;
overflow-x:hidden;
color:white;
min-height:100vh;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
max-width:850px;
margin:40px auto;
padding:20px;
}

h1{
text-align:center;
font-size:40px;
margin-bottom:20px;
text-shadow:0 0 15px #ff7aa2;
}

.btn{
display:block;
margin:auto;
padding:15px 35px;
border:none;
border-radius:50px;
font-size:18px;
cursor:pointer;
color:white;
background:linear-gradient(45deg,#ff4d6d,#ff8fab);
transition:.4s;
box-shadow:0 0 20px rgba(255,77,109,.5);
}

.btn:hover{
transform:scale(1.05);
}

.box{
display:none;
margin-top:35px;
padding:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

/* ---------- GAMBAR ---------- */

.img-row{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
margin-bottom:20px;
}

.img-row img{
width:110px;
height:110px;
object-fit:cover;
border-radius:15px;
border:2px solid rgba(255,255,255,.4);
transition:.4s;
}

.img-row img:hover{
transform:scale(1.08);
}

/* ---------- TEXT ---------- */

#text{
font-size:18px;
line-height:1.8;
white-space:pre-line;
text-align:left;
}

#final{
display:none;
text-align:center;
margin-top:30px;
font-size:22px;
animation:fade 2s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
<source src="imagination.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1>Happy Birthday 🎂</h1>

<button class="btn" onclick="start()">
Open Message 🤍
</button>

<div class="box" id="box">

<div class="img-row">

<img src="img1.jpg">
<img src="img2.jpg">
<img src="img3.jpg">
<img src="img4.jpg">
<img src="img5.jpg">

</div>

<div id="text"></div>

<div id="final">
🤍 Thank You For Everything 🤍
</div>

</div>

</div>
<script>

const text = `
Hi U...

Happy Belated Birthday 🎂

I'm really sorry sebab I wish U lambat.

I hope your special day penuh dengan happiness, laughter and people who truly love U.

Lately, I keep thinking about U more than I should.

I miss the way things used to be.

Now everything feels a little different...

But I still care about U.

And somehow... I still wait.

If one day U decide to come back into my life, I'll still be here.

Take care of yourself okay 🤍
`;

function start(){

// Hide button
document.querySelector(".btn").style.display="none";

// Show message box
document.getElementById("box").style.display="block";

// Play music
const audio=document.getElementById("music");
audio.volume=0;

audio.play().catch(err=>{
console.log(err);
});

// Fade in music
let volume=0;

const fade=setInterval(()=>{

if(volume<1){

volume+=0.05;

audio.volume=volume;

}else{

clearInterval(fade);

}

},200);

// Typing effect
let i=0;

function typing(){

if(i<text.length){

document.getElementById("text").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,30);

}else{

document.getElementById("final").style.display="block";

}

}

typing();

}

</script>

</body>
</html>
