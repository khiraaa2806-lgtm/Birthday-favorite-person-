<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>
body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* 🌌 background slideshow */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background-size:cover;
background-position:center;
filter:blur(10px) brightness(0.35);
animation:zoomFade 25s infinite;
z-index:-1;
}

/* 🔥 zoom + fade cinematic */
@keyframes zoomFade{
0%{background-image:url('img1.jpg'); transform:scale(1);}
20%{background-image:url('img2.jpg'); transform:scale(1.1);}
40%{background-image:url('img3.jpg'); transform:scale(1.2);}
60%{background-image:url('img4.jpg'); transform:scale(1.1);}
80%{background-image:url('img5.jpg'); transform:scale(1.2);}
100%{background-image:url('img1.jpg'); transform:scale(1);}
}

/* title glow */
h1{
text-align:center;
margin-top:30px;
text-shadow:0 0 10px #ff4d6d;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{opacity:0.7; text-shadow:0 0 5px #ff4d6d;}
to{opacity:1; text-shadow:0 0 20px #ff4d6d;}
}

/* paragraph style */
.box{
max-width:650px;
margin:40px auto;
padding:20px;
background:rgba(0,0,0,0.4);
border-radius:15px;
line-height:1.8;
backdrop-filter:blur(6px);
animation:fadeIn 2s forwards;
opacity:0;
animation-delay:1s;
}

@keyframes fadeIn{
to{opacity:1;}
}

button{
display:block;
margin:20px auto;
padding:12px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

/* 💌 final message */
#final{
display:none;
text-align:center;
margin-top:20px;
opacity:0;
animation:fadeIn 2s forwards;
}
</style>
</head>

<body>

<!-- 🌌 background -->
<div class="bg"></div>

<!-- 🎵 MUSIC (IMAGINATION) -->
<audio id="music" loop>
<source src="imagination.mp3" type="audio/mp3">
</audio>

<h1>Happy Birthday 🎂</h1>

<button onclick="start()">Open Message</button>

<div class="box" id="text">

</div>

<div id="final">
<p>my favorite person 🤍</p>
<p>open when you miss me</p>
</div>

<script>

const text = `
Happy Belated Birthday 🎂

Sorry sebab lambat wish you.

I hope tahun baru dalam hidup you brings a lot of happiness, good health, and everything that you wish for.

I tak tahu apa akan jadi in the future. Tapi kalau satu hari nanti you perlukan someone to talk to, I still ada. I know you have your family who can make you happy and loved, but I still want you to know I will always be here for you too.

I still hold on to my promise… I will wait, if one day you need me again.

I don’t want to force anything. I just hope you are happy, even if it’s without me.

Thank you for all the memories.

Take care of yourself okay 🤍
`;

function start(){

// 🎵 play music
let audio = document.getElementById("music");
audio.volume = 0;
audio.play();

// fade in music
let v = 0;
let fade = setInterval(()=>{
if(v < 1){
v += 0.05;
audio.volume = v;
}else{
clearInterval(fade);
}
},200);

// show text slowly
let i = 0;
function type(){
if(i < text.length){
document.getElementById("text").innerHTML += text.charAt(i);
i++;
setTimeout(type, 25);
}else{
document.getElementById("final").style.display="block";
}
}
type();
}

</script>

</body>
</html>
