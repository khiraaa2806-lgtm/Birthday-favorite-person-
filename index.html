<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* 🌌 BACKGROUND SLIDESHOW */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background-size:cover;
background-position:center;
filter:blur(10px) brightness(0.35);
transition:2s ease-in-out;
z-index:-1;
}

/* 🎂 TITLE */
h1{
text-align:center;
margin-top:30px;
text-shadow:0 0 10px #ff4d6d;
}

/* 📦 MAIN BOX */
.box{
max-width:700px;
margin:40px auto;
padding:20px;
background:rgba(0,0,0,0.4);
border-radius:15px;
line-height:1.8;
backdrop-filter:blur(6px);
opacity:0;
transition:2s;
}

/* 🖼️ 5 IMAGES */
.img-row{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.img-row img{
width:90px;
height:90px;
object-fit:cover;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
transition:0.3s;
}

.img-row img:hover{
transform:scale(1.2);
}

/* ✨ BUTTON */
.btn{
display:block;
margin:20px auto;
padding:14px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d6d,#ff9a9e);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 20px rgba(255,77,109,0.6);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(255,77,109,0.9);
}

/* 💌 FINAL */
#final{
display:none;
text-align:center;
margin-top:20px;
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<div class="bg"></div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
<source src="imagination.mp3" type="audio/mp3">
</audio>

<h1>Happy Birthday 🎂</h1>

<button class="btn" onclick="start()">Open Message ✨</button>

<div class="box" id="box">

  <!-- 🖼️ 5 GAMBAR -->
  <div class="img-row">
    <img src="img1.jpg">
    <img src="img2.jpg">
    <img src="img3.jpg">
    <img src="img4.jpg">
    <img src="img5.jpg">
  </div>

  <!-- ✍️ TEXT -->
  <div id="text"></div>

</div>

<div id="final">
<p>my favorite person 🤍</p>
<p>open when you miss me</p>
</div>

<script>

const text = `
Happy Belated Birthday 🎂

Sorry sebab lambat wish you.

I hope tahun baru dalam hidup you brings a lot of happiness, good health, and everything that you wish for.

Take care of yourself okay 🤍
`;

let images = ["img1.jpg","img2.jpg","img3.jpg","img4.jpg","img5.jpg"];
let imgIndex = 0;

function start(){

// 🎵 music
let audio = document.getElementById("music");
audio.volume = 0;
audio.play();

// fade music
let v = 0;
let fade = setInterval(()=>{
if(v < 1){
v += 0.05;
audio.volume = v;
}else{
clearInterval(fade);
}
},200);

// 🌌 background slide
setInterval(()=>{
document.querySelector(".bg").style.backgroundImage =
"url('" + images[imgIndex] + "')";
imgIndex = (imgIndex + 1) % images.length;
}, 5000);

// show box
document.getElementById("box").style.opacity = 1;

// type text
typeText();

// final message delay
setTimeout(()=>{
document.getElementById("final").style.display="block";
setTimeout(()=>{
document.getElementById("final").style.opacity=1;
},100);
}, 20000);

}

// ✍️ type animation
function typeText(){
let i = 0;
let box = document.getElementById("text");

function type(){
if(i < text.length){
box.innerHTML += text.charAt(i);
i++;
setTimeout(type, 25);
}
}
type();
}

</script>

</body>
</html>
