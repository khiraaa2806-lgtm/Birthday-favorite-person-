<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow:hidden;
}

/* 🌌 AESTHETIC BACKGROUND (NO IMAGE) */
.bg{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
background:linear-gradient(-45deg,#0f0c29,#302b63,#24243e,#ff4d6d);
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
filter:blur(20px) brightness(0.7);
z-index:-1;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🎂 TITLE */
h1{
text-align:center;
margin-top:30px;
text-shadow:0 0 10px #ff4d6d;
}

/* 📦 BOX */
.box{
max-width:700px;
margin:40px auto;
padding:20px;
background:rgba(0,0,0,0.4);
border-radius:15px;
line-height:1.8;
backdrop-filter:blur(6px);
opacity:0;
transition:2s;
}

/* ✨ BUTTON */
.btn{
display:block;
margin:20px auto;
padding:14px 28px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#ff4d6d,#ff9a9e);
color:white;
font-size:16px;
cursor:pointer;
box-shadow:0 0 20px rgba(255,77,109,0.6);
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px rgba(255,77,109,0.9);
}

/* 💌 FINAL */
#final{
display:none;
text-align:center;
margin-top:20px;
opacity:0;
transition:2s;
}

</style>
</head>

<body>

<!-- 🌌 BACKGROUND -->
<div class="bg"></div>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
<source src="imagination.mp3" type="audio/mp3">
</audio>

<h1>Happy Birthday 🎂</h1>

<button class="btn" onclick="start()">Open Message ✨</button>

<div class="box" id="box">

<div id="text"></div>

</div>

<div id="final">
<p>my favorite person 🤍</p>
<p>open when you miss me</p>
</div>

<script>

const text = `
Hi U...

Happy Belated Birthday 🎂

I’m late again… I know.

I hope U’re doing okay… really.

I miss U… but I stay quiet.

Things will never feel the same.

But I still care… from far away.

If U ever come back… I’ll still be here.

Take care 🤍
`;

function start(){

// 🎵 music
let audio = document.getElementById("music");
audio.volume = 0;
audio.play().catch(()=>{});

// fade in music
let v = 0;
let fade = setInterval(()=>{
if(v < 1){
v += 0.05;
audio.volume = v;
}else{
clearInterval(fade);
}
},200);

// show box
document.getElementById("box").style.opacity = 1;

// type text
typeText();

// final message delay
setTimeout(()=>{
document.getElementById("final").style.display="block";
setTimeout(()=>{
document.getElementById("final").style.opacity=1;
},100);
}, 20000);

}

// ✍️ typing effect
function typeText(){
let i = 0;
let box = document.getElementById("text");

function type(){
if(i < text.length){
box.innerHTML += text.charAt(i);
i++;
setTimeout(type, 25);
}
}
type();
}

</script>

</body>
</html>
